<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="פלטפורמת טיולים חכמה מבוססת AI - תכנון, מעקב, ותקשורת קבוצתית בזמן אמת" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TravelPlatform" />

    <!-- Open Graph -->
    <meta property="og:title" content="TravelPlatform — AI Travel Companion" />
    <meta property="og:description" content="AI-driven multi-tenant travel planning platform" />
    <meta property="og:type" content="website" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>TravelPlatform</title>
  </head>
  <body>
    <div id="root">
      <style>
        #splash {
          position: fixed; inset: 0; display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          background: #ffffff; z-index: 9999;
        }
        @media (prefers-color-scheme: dark) {
          #splash { background: #0f172a; }
        }
        .splash-logo {
          width: 120px; height: 120px;
          animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
          0% { transform: scale(0.95); opacity: 0.8; }
          50% { transform: scale(1.05); opacity: 1; }
          100% { transform: scale(0.95); opacity: 0.8; }
        }
      </style>
      <div id="splash">
        <img src="/logo.png" alt="TripAp Logo" class="splash-logo" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
